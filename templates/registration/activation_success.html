{% extends 'base.html' %}
{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm rounded-4 p-5">
                <i class="fas fa-check-circle fa-3x text-success mb-4"></i>
                <h2 class="fw-bold mb-3">Activation Successful!</h2>
                <p class="text-muted mb-4">You have successfully activated your account. You can now log in to access all features.</p>
                <a href="{% url 'login' %}" class="btn btn-primary rounded-pill px-4">Log In Now</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
